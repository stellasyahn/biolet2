<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biology Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&amp;family=Noto+Serif+KR:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:linear-gradient(135deg,#E8F4F8 0%,#D4E9F0 100%);font-family:'Noto Serif KR',sans-serif;min-height:100vh;color:#2D3561;}
#root{position:relative;z-index:1;}

.hdr{background:linear-gradient(135deg,#5B7C99,#3D5A73);position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(61,90,115,.3);}
.hdr-in{max-width:900px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-ic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.1));border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.logo-t{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#FFF;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.2);}
.logo-s{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:2px;}
.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn-nav{padding:8px 18px;border-radius:24px;border:2px solid rgba(255,255,255,.3);cursor:pointer;font-size:13px;transition:all .3s;color:rgba(255,255,255,.8);background:transparent;font-family:'Noto Serif KR',sans-serif;font-weight:500;}
.btn-nav.act{background:rgba(255,255,255,.25);color:#FFF;border-color:rgba(255,255,255,.5);}
.btn-nav:hover{background:rgba(255,255,255,.2);color:#FFF;transform:translateY(-2px);}
.admin-badge{padding:6px 14px;border-radius:24px;background:linear-gradient(135deg,rgba(255,215,0,.3),rgba(255,200,0,.2));color:#FFD700;border:2px solid rgba(255,215,0,.4);font-size:11px;font-weight:600;cursor:pointer;}

.ct{padding:28px 20px;max-width:900px;margin:0 auto;}
.hint{font-size:12px;color:#5B7C99;font-style:italic;font-family:'Playfair Display',serif;margin-bottom:16px;text-align:center;}
.map-wrapper{background:linear-gradient(135deg,#FFF 0%,#F0F8FF 100%);border-radius:20px;border:2px solid rgba(91,124,153,.2);overflow:hidden;margin-bottom:24px;box-shadow:0 8px 32px rgba(61,90,115,.15);padding:24px;}

.btn{border:none;cursor:pointer;font-family:'Noto Serif KR',sans-serif;border-radius:12px;transition:all .3s;font-weight:600;}
.btn-p{padding:10px 20px;background:linear-gradient(135deg,#5B7C99,#4A6B88);color:#FFF;font-size:13px;box-shadow:0 4px 12px rgba(61,90,115,.25);}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(61,90,115,.35);}
.btn-s{padding:10px 16px;background:#FFF;color:#5B7C99;border:2px solid rgba(91,124,153,.3);font-size:13px;}
.btn-export{padding:10px 20px;background:linear-gradient(135deg,#7BA3C5,#6B93B5);color:#FFF;font-size:13px;box-shadow:0 4px 12px rgba(91,124,153,.25);}
.btn-g{padding:7px 13px;background:#FFF;color:#5B7C99;border:2px solid rgba(91,124,153,.25);font-size:11px;}
.btn-d{padding:7px 13px;background:linear-gradient(135deg,#FFE5E5,#FFD5D5);color:#C44;border:2px solid rgba(204,68,68,.2);font-size:11px;}

.inp{padding:12px 16px;border-radius:12px;border:2px solid rgba(91,124,153,.25);background:#FFF;color:#2D3561;font-size:14px;font-family:'Noto Serif KR',sans-serif;outline:none;width:100%;transition:all .3s;}
.inp:focus{border-color:#5B7C99;box-shadow:0 0 0 4px rgba(91,124,153,.1);}
.lbl{font-size:12px;font-weight:600;color:#5B7C99;margin-bottom:6px;display:block;}

.modal-bg{position:fixed;inset:0;background:rgba(45,53,97,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:linear-gradient(135deg,#FFF 0%,#F5FAFF 100%);border-radius:24px;padding:28px;width:380px;max-width:92vw;box-shadow:0 24px 60px rgba(61,90,115,.3);border:2px solid rgba(91,124,153,.2);max-height:90vh;overflow-y:auto;}
.modal-t{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:#2D3561;margin-bottom:18px;}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:toastIn .3s;}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.toast.ok{background:linear-gradient(135deg,#5B7C99,#4A6B88);color:#FFF;}

.shelf-container{background:linear-gradient(135deg,#FFF,#F8FBFF);border-radius:20px;border:2px solid rgba(91,124,153,.2);padding:24px;box-shadow:0 8px 24px rgba(61,90,115,.1);}
.shelf-visual{background:linear-gradient(135deg,#F0F8FF,#E8F4F8);border:3px solid rgba(91,124,153,.3);border-radius:16px;padding:20px;position:relative;}
.shelf-floor{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:16px 0;border-bottom:2px dashed rgba(91,124,153,.2);}
.shelf-floor:last-child{border:none;}
.shelf-floor-label{position:absolute;left:-50px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:700;color:#5B7C99;writing-mode:vertical-rl;}
.shelf-cell{background:linear-gradient(135deg,#FFF,#F5FAFF);border:2px solid rgba(91,124,153,.25);border-radius:10px;padding:12px 8px;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .3s;position:relative;}
.shelf-cell:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(61,90,115,.2);border-color:#5B7C99;}
.shelf-cell-name{font-size:11px;font-weight:600;color:#2D3561;text-align:center;line-height:1.3;word-break:break-word;}
.shelf-cell-qty{font-size:10px;color:#5B7C99;font-weight:600;}
.shelf-cell-empty{color:#B0C4D4;font-style:italic;font-size:10px;}
.shelf-cell-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:8px;right:8px;}
</style>
</head>
<body>
<div id="root"><div class="hdr"><div class="hdr-in"><div class="logo"><div class="logo-ic">🔬</div><div><div class="logo-t">Biology Lab</div><div class="logo-s">SPECIMEN</div></div></div><div class="nav"><button class="btn-nav act" onclick="app.setView('map')">약도</button><button class="btn-nav" onclick="app.toggleSearch()">🔍 검색</button><button class="btn-export" onclick="app.showExportModal()">📥 내보내기</button><button class="btn-nav" onclick="app.openLogin()">🔒</button></div></div></div><div class="ct"><div class="hint">· 선반을 클릭하여 기자재를 관리하세요 ·</div><div class="map-wrapper"><svg viewBox="0 0 680 720" style="width:100%;display:block;"><defs><linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#7BA3C5;stop-opacity:0.3"></stop><stop offset="100%" style="stop-color:#5B7C99;stop-opacity:0.2"></stop></linearGradient></defs><rect x="40" y="30" width="600" height="660" rx="8" fill="#F8FBFF" stroke="#B0C4D4" stroke-width="2.5"></rect><rect x="40" y="30" width="60" height="50" rx="3" fill="#FFF" stroke="#B0C4D4" stroke-width="2"></rect><text x="70" y="59" text-anchor="middle" font-size="11" fill="#7BA3C5">출입문</text><g onclick="app.openShelf('A')" style="cursor:pointer;"><rect x="40" y="95" width="90" height="75" rx="4" fill="url(#sg)" stroke="#5B7C99" stroke-width="2"></rect><text x="85" y="133" text-anchor="middle" font-size="24" fill="#2D3561" font-weight="700">A</text><text x="85" y="150" text-anchor="middle" font-size="9" fill="#5B7C99">1개</text></g><g onclick="app.openShelf('B')" style="cursor:pointer;"><rect x="40" y="185" width="90" height="75" rx="4" fill="url(#sg)" stroke="#5B7C99" stroke-width="2"></rect><text x="85" y="223" text-anchor="middle" font-size="24" fill="#2D3561" font-weight="700">B</text><text x="85" y="240" text-anchor="middle" font-size="9" fill="#5B7C99">1개</text></g><g onclick="app.openShelf('C')" style="cursor:pointer;"><rect x="40" y="275" width="90" height="75" rx="4" fill="url(#sg)" stroke="#5B7C99" stroke-width="2"></rect><text x="85" y="313" text-anchor="middle" font-size="24" fill="#2D3561" font-weight="700">C</text><text x="85" y="330" text-anchor="middle" font-size="9" fill="#5B7C99">0개</text></g><g onclick="app.openShelf('D')" style="cursor:pointer;"><rect x="40" y="365" width="90" height="75" rx="4" fill="url(#sg)" stroke="#5B7C99" stroke-width="2"></rect><text x="85" y="403" text-anchor="middle" font-size="24" fill="#2D3561" font-weight="700">D</text><text x="85" y="420" text-anchor="middle" font-size="9" fill="#5B7C99">0개</text></g><g onclick="app.openShelf('E')" style="cursor:pointer;"><rect x="40" y="455" width="90" height="75" rx="4" fill="url(#sg)" stroke="#5B7C99" stroke-width="2"></rect><text x="85" y="493" text-anchor="middle" font-size="24" fill="#2D3561" font-weight="700">E</text><text x="85" y="510" text-anchor="middle" font-size="9" fill="#5B7C99">0개</text></g><g onclick="app.openShelf('F')" style="cursor:pointer;"><rect x="40" y="545" width="90" height="75" rx="4" fill="url(#sg)" stroke="#5B7C99" stroke-width="2"></rect><text x="85" y="583" text-anchor="middle" font-size="24" fill="#2D3561" font-weight="700">F</text><text x="85" y="600" text-anchor="middle" font-size="9" fill="#5B7C99">0개</text></g><rect x="40" y="635" width="60" height="55" rx="3" fill="#FFF" stroke="#B0C4D4" stroke-width="2"></rect><text x="70" y="666" text-anchor="middle" font-size="11" fill="#7BA3C5">출입문</text><rect x="200" y="30" width="440" height="110" rx="4" fill="#E8F4F8" stroke="#B0C4D4" stroke-width="1.5"></rect><rect x="300" y="155" width="50" height="45" fill="none" stroke="#B0C4D4" stroke-width="1.5"></rect><rect x="355" y="155" width="50" height="45" fill="none" stroke="#B0C4D4" stroke-width="1.5"></rect><rect x="410" y="155" width="50" height="45" fill="none" stroke="#B0C4D4" stroke-width="1.5"></rect><g onclick="app.openShelf('drug')" style="cursor:pointer;"><rect x="510" y="155" width="130" height="120" rx="4" fill="url(#sg)" stroke="#4A6B88" stroke-width="2"></rect><text x="575" y="205" text-anchor="middle" font-size="12" fill="#2D3561" font-weight="700">약품보관장</text><text x="575" y="222" text-anchor="middle" font-size="9" fill="#5B7C99">0개</text></g><g onclick="app.openShelf('G')" style="cursor:pointer;"><rect x="510" y="290" width="130" height="100" rx="4" fill="url(#sg)" stroke="#5B7C99" stroke-width="2"></rect><text x="575" y="340" text-anchor="middle" font-size="28" fill="#2D3561" font-weight="700">G</text><text x="575" y="360" text-anchor="middle" font-size="9" fill="#5B7C99">0개</text></g><rect x="510" y="405" width="130" height="190" rx="4" fill="#E8E8E8" stroke="#6B6B6B" stroke-width="2"></rect><text x="575" y="505" text-anchor="middle" font-size="12" fill="#4A4A4A">싱크대</text><rect x="470" y="645" width="170" height="45" rx="4" fill="#E8E8E8" stroke="#6B6B6B" stroke-width="2"></rect><text x="555" y="671" text-anchor="middle" font-size="11" fill="#4A4A4A">책상</text><rect x="180" y="645" width="270" height="45" rx="4" fill="rgba(91,124,153,0.25)" stroke="#5B7C99" stroke-width="2.5"></rect><text x="315" y="671" text-anchor="middle" font-size="14" fill="#2D3561" font-weight="600">칠  판</text></svg></div></div></div>

<script>
const ITEM_COLORS=[
  {label:"기본",value:"#94A3B8"},{label:"빨강",value:"#C44"},
  {label:"주황",value:"#E67E22"},{label:"노랑",value:"#F39C12"},
  {label:"초록",value:"#27AE60"},{label:"파랑",value:"#5B7C99"},
  {label:"보라",value:"#8E44AD"},{label:"핑크",value:"#E91E63"},
];

const STATUS_OPTIONS=[
  {value:"정상",color:"#27AE60"},{value:"부족",color:"#E67E22"},
  {value:"점검필요",color:"#C44"},{value:"없음",color:"#95A5A6"},
];

const DEFAULT_PIN="1234";

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

const makeFloors=(id,n,cols=6)=>Array.from({length:n},(_,i)=>({
  id:`${id}-fl${i+1}`,
  label:`${i+1}층`,
  items:Array(cols).fill(null)
}));

const INIT_SHELVES=[{"id":"A","name":"A 선반","color":"#5B7C99","floors":[{"id":"A-fl1","label":"1층","items":[null,null,null,null,null,null]},{"id":"A-fl2","label":"2층","items":[null,null,null,null,null,null,{"name":"Test","qty":1,"status":"정상","color":"#5B7C99","memo":""}]}]},{"id":"B","name":"B 선반","color":"#5B7C99","floors":[{"id":"B-fl1","label":"1층","items":[null,null,null,null,null,null]},{"id":"B-fl2","label":"2층","items":[null,null,null,null,null,null,{"name":"Test2","qty":1,"status":"정상","color":"#5B7C99","memo":""}]}]},{"id":"C","name":"C 선반","color":"#5B7C99","floors":[{"id":"C-fl1","label":"1층","items":[null,null,null,null,null,null]},{"id":"C-fl2","label":"2층","items":[null,null,null,null,null,null]}]},{"id":"D","name":"D 선반","color":"#5B7C99","floors":[{"id":"D-fl1","label":"1층","items":[null,null,null,null,null,null]},{"id":"D-fl2","label":"2층","items":[null,null,null,null,null,null]}]},{"id":"E","name":"E 선반","color":"#5B7C99","floors":[{"id":"E-fl1","label":"1층","items":[null,null,null,null,null,null]},{"id":"E-fl2","label":"2층","items":[null,null,null,null,null,null]}]},{"id":"F","name":"F 선반","color":"#5B7C99","floors":[{"id":"F-fl1","label":"1층","items":[null,null,null,null,null,null]},{"id":"F-fl2","label":"2층","items":[null,null,null,null,null,null]}]},{"id":"drug","name":"약품보관장","color":"#4A6B88","floors":[{"id":"drug-fl1","label":"1층","items":[null,null,null,null,null,null]},{"id":"drug-fl2","label":"2층","items":[null,null,null,null,null,null]}]},{"id":"G","name":"G 선반","color":"#5B7C99","floors":[{"id":"G-fl1","label":"1층","items":[null,null,null,null,null,null]}]}];

let state={
  shelves:INIT_SHELVES,
  adminPin:DEFAULT_PIN,
  view:"map",
  selectedId:null,
  isAdmin:false,
  showPin:false,
  showCP:false,
  itemForm:null,
  renameForm:null,
  toast:null,
  showSearch:false,
  searchQuery:'',
  confirmDelete:false,
  showExportConfirm:false,
};

function save(){
  try{localStorage.setItem('biolab',JSON.stringify({shelves:state.shelves,adminPin:state.adminPin}));}
  catch(e){console.error(e);}
}

function load(){
  try{
    const data=localStorage.getItem('biolab');
    if(data){
      const parsed=JSON.parse(data);
      if(parsed.shelves)state.shelves=parsed.shelves;
      if(parsed.adminPin)state.adminPin=parsed.adminPin;
    }
  }catch(e){console.error(e);}
}

function showToast(msg){
  state.toast=msg;
  render();
  setTimeout(()=>{state.toast=null;render();},2200);
}

function updateShelves(fn){
  state.shelves=fn(state.shelves);
  save();
  render();
}

function exportHTML(){
  console.log('exportHTML - 실제 다운로드 실행');
  
  try{
    // 현재 state 데이터를 JSON으로 직렬화
    const currentShelves = JSON.stringify(state.shelves);
    const currentPin = JSON.stringify(state.adminPin);

    // 원본 HTML에서 INIT_SHELVES와 DEFAULT_PIN을 현재 데이터로 교체
    let html = document.documentElement.outerHTML;

    // INIT_SHELVES 배열 전체를 현재 shelves 데이터로 교체
    html = html.replace(
      /const INIT_SHELVES=\[[\s\S]*?\];/,
      'const INIT_SHELVES=' + currentShelves + ';'
    );

    // DEFAULT_PIN을 현재 PIN으로 교체
    html = html.replace(
      /const DEFAULT_PIN="[^"]*";/,
      'const DEFAULT_PIN=' + currentPin + ';'
    );

    console.log('HTML 길이:', html.length);
    
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='생물실_기자재_'+new Date().toISOString().slice(0,10)+'.html';
    a.style.display='none';
    document.body.appendChild(a);
    
    console.log('다운로드 시작...');
    a.click();
    
    setTimeout(()=>{
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      console.log('다운로드 완료');
    },100);
    
    showToast('HTML 파일 다운로드 완료!');
    
  }catch(e){
    console.error('다운로드 실패:', e);
    alert('다운로드 실패: '+e.message);
  }
}

// 전역으로 노출
window.exportHTML=exportHTML;

function renderShelfView(shelf){
  let html='<div class="shelf-container">';
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;"><div style="display:flex;align-items:center;gap:12px;">`;
  
  if(state.renameForm===shelf.id){
    html+=`<input type="text" id="renameinp" class="inp" value="${shelf.name}" style="width:200px;"/><button class="btn-g" onclick="app.saveRename('${shelf.id}')">저장</button><button class="btn-g" onclick="app.closeRename()">취소</button>`;
  }else{
    html+=`<span style="font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#2D3561;">${shelf.name}</span>`;
    if(state.isAdmin){
      html+=`<button class="btn-g" onclick="app.openRename('${shelf.id}')">이름 수정</button>`;
    }
  }
  
  html+=`</div><button class="btn-s" onclick="app.setView('map')">← 약도</button></div>`;
  
  html+='<div class="shelf-visual">';
  
  for(let floorIdx=shelf.floors.length-1;floorIdx>=0;floorIdx--){
    const floor=shelf.floors[floorIdx];
    
    // 실제 아이템들만 필터링
    const actualItems=floor.items.filter(item=>item!==null);
    
    html+=`<div style="position:relative;"><div style="font-size:12px;font-weight:600;color:#5B7C99;margin-bottom:8px;padding-left:8px;display:flex;justify-content:space-between;align-items:center;"><span>${floor.label}</span><span style="font-size:11px;color:#7BA3C5;">${actualItems.length}개</span></div><div class="shelf-floor" style="grid-template-columns:repeat(auto-fill,minmax(120px,1fr));">`;
    
    actualItems.forEach((item,displayIdx)=>{
      const stOpt=STATUS_OPTIONS.find(s=>s.value===item.status)||STATUS_OPTIONS[0];
      html+=`<div class="shelf-cell" onclick="app.openEditCell('${shelf.id}','${floor.id}',${displayIdx})"><div class="shelf-cell-name">${item.name}</div><div class="shelf-cell-qty">×${item.qty}</div><div class="shelf-cell-dot" style="background:${stOpt.color};"></div></div>`;
    });
    
    if(state.isAdmin){
      html+=`<div class="shelf-cell" onclick="app.openAddCell('${shelf.id}','${floor.id}',-1)" style="border:2px dashed rgba(91,124,153,.4);"><div class="shelf-cell-empty">+ 추가</div></div>`;
    }
    
    html+='</div></div>';
  }
  
  html+='</div></div>';
  return html;
}

function render(){
  const root=document.getElementById('root');
  
  let html='<div class="hdr"><div class="hdr-in"><div class="logo"><div class="logo-ic">🔬</div><div><div class="logo-t">Biology Lab</div><div class="logo-s">SPECIMEN</div></div></div><div class="nav">';
  
  html+=`<button class="btn-nav ${state.view==='map'?'act':''}" onclick="app.setView('map')">약도</button>`;
  html+=`<button class="btn-nav" onclick="app.toggleSearch()">🔍 검색</button>`;
  html+=`<button class="btn-export" onclick="app.showExportModal()">📥 내보내기</button>`;
  
  if(state.isAdmin){
    html+=`<div style="display:flex;gap:8px;align-items:center;"><div class="admin-badge" onclick="app.logout()">⚙ Admin</div><button class="btn-nav" onclick="app.openChangePin()">PIN</button></div>`;
  }else{
    html+=`<button class="btn-nav" onclick="app.openLogin()">🔒</button>`;
  }
  
  html+='</div></div></div>';
  
  html+='<div class="ct">';
  
  if(state.view==='map'){
    html+='<div class="hint">· 선반을 클릭하여 기자재를 관리하세요 ·</div>';
    
    // 검색 UI
    if(state.showSearch){
      html+=`<div style="background:linear-gradient(135deg,#FFF,#F8FBFF);border-radius:16px;padding:20px;margin-bottom:20px;border:2px solid rgba(91,124,153,.2);"><input type="text" id="searchInput" class="inp" placeholder="기자재 검색..." value="${state.searchQuery}" oninput="app.updateSearch(this.value)" style="margin-bottom:12px;"/>`;
      
      if(state.searchQuery){
        const results=[];
        state.shelves.forEach(shelf=>{
          shelf.floors.forEach(floor=>{
            floor.items.forEach((item,idx)=>{
              if(item&&item.name.toLowerCase().includes(state.searchQuery.toLowerCase())){
                results.push({shelf:shelf.name,floor:floor.label,item:item.name,shelfId:shelf.id});
              }
            });
          });
        });
        
        if(results.length>0){
          html+=`<div style="font-size:13px;color:#5B7C99;margin-bottom:8px;font-weight:600;">검색 결과 ${results.length}개</div>`;
          results.forEach(r=>{
            html+=`<div onclick="app.openShelf('${r.shelfId}')" style="background:#FFF;padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;border:2px solid rgba(91,124,153,.15);transition:all .2s;" onmouseover="this.style.borderColor='#5B7C99'" onmouseout="this.style.borderColor='rgba(91,124,153,.15)'"><div style="font-weight:600;color:#2D3561;margin-bottom:4px;">${r.shelf} - ${r.floor}</div><div style="color:#5B7C99;font-size:13px;">${r.item}</div></div>`;
          });
        }else{
          html+=`<div style="text-align:center;color:#B0C4D4;padding:20px;font-style:italic;">검색 결과가 없습니다</div>`;
        }
      }
      
      html+=`</div>`;
    }
    
    html+='<div class="map-wrapper">';
    html+='<svg viewBox="0 0 680 720" style="width:100%;display:block;"><defs><linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#7BA3C5;stop-opacity:0.3"/><stop offset="100%" style="stop-color:#5B7C99;stop-opacity:0.2"/></linearGradient></defs>';
    
    // 전체 테두리
    html+='<rect x="40" y="30" width="600" height="660" rx="8" fill="#F8FBFF" stroke="#B0C4D4" stroke-width="2.5"/>';
    
    // 왼쪽 위 출입문
    html+='<rect x="40" y="30" width="60" height="50" rx="3" fill="#FFF" stroke="#B0C4D4" stroke-width="2"/>';
    html+='<text x="70" y="59" text-anchor="middle" font-size="11" fill="#7BA3C5">출입문</text>';
    
    // 왼쪽 선반 A~F
    ['A','B','C','D','E','F'].forEach((name,i)=>{
      const y=95+i*90;
      const sh=state.shelves.find(s=>s.id===name);
      const sel=sh&&sh.id===state.selectedId;
      const totalItems=sh?sh.floors.reduce((sum,fl)=>sum+fl.items.filter(it=>it!==null).length,0):0;
      html+=`<g onclick="app.openShelf('${name}')" style="cursor:pointer;">`;
      if(sel)html+=`<rect x="37" y="${y-3}" width="96" height="81" rx="6" fill="none" stroke="#5B7C99" stroke-width="2.5" opacity="0.6"/>`;
      html+=`<rect x="40" y="${y}" width="90" height="75" rx="4" fill="${sel?'#C8DAEA':'url(#sg)'}" stroke="#5B7C99" stroke-width="2"/>`;
      html+=`<text x="85" y="${y+38}" text-anchor="middle" font-size="24" fill="#2D3561" font-weight="700">${name}</text>`;
      html+=`<text x="85" y="${y+55}" text-anchor="middle" font-size="9" fill="#5B7C99">${totalItems}개</text>`;
      html+=`</g>`;
    });
    
    // 왼쪽 아래 출입문
    html+='<rect x="40" y="635" width="60" height="55" rx="3" fill="#FFF" stroke="#B0C4D4" stroke-width="2"/>';
    html+='<text x="70" y="666" text-anchor="middle" font-size="11" fill="#7BA3C5">출입문</text>';
    
    // 위쪽 큰 공간 (텍스트 없음)
    html+='<rect x="200" y="30" width="440" height="110" rx="4" fill="#E8F4F8" stroke="#B0C4D4" stroke-width="1.5"/>';
    
    // 네모 3개
    html+='<rect x="300" y="155" width="50" height="45" fill="none" stroke="#B0C4D4" stroke-width="1.5"/>';
    html+='<rect x="355" y="155" width="50" height="45" fill="none" stroke="#B0C4D4" stroke-width="1.5"/>';
    html+='<rect x="410" y="155" width="50" height="45" fill="none" stroke="#B0C4D4" stroke-width="1.5"/>';
    
    // 약품보관장
    const drugSh=state.shelves.find(s=>s.id==='drug');
    const drugSel=drugSh&&drugSh.id===state.selectedId;
    const drugTotal=drugSh?drugSh.floors.reduce((sum,fl)=>sum+fl.items.filter(it=>it!==null).length,0):0;
    html+=`<g onclick="app.openShelf('drug')" style="cursor:pointer;">`;
    if(drugSel)html+=`<rect x="507" y="152" width="136" height="126" rx="6" fill="none" stroke="#4A6B88" stroke-width="2.5" opacity="0.6"/>`;
    html+=`<rect x="510" y="155" width="130" height="120" rx="4" fill="${drugSel?'#C8DAEA':'url(#sg)'}" stroke="#4A6B88" stroke-width="2"/>`;
    html+=`<text x="575" y="205" text-anchor="middle" font-size="12" fill="#2D3561" font-weight="700">약품보관장</text>`;
    html+=`<text x="575" y="222" text-anchor="middle" font-size="9" fill="#5B7C99">${drugTotal}개</text>`;
    html+=`</g>`;
    
    // G 선반 (1층만)
    const gSh=state.shelves.find(s=>s.id==='G');
    const gSel=gSh&&gSh.id===state.selectedId;
    const gTotal=gSh?gSh.floors.reduce((sum,fl)=>sum+fl.items.filter(it=>it!==null).length,0):0;
    html+=`<g onclick="app.openShelf('G')" style="cursor:pointer;">`;
    if(gSel)html+=`<rect x="507" y="287" width="136" height="106" rx="6" fill="none" stroke="#5B7C99" stroke-width="2.5" opacity="0.6"/>`;
    html+=`<rect x="510" y="290" width="130" height="100" rx="4" fill="${gSel?'#C8DAEA':'url(#sg)'}" stroke="#5B7C99" stroke-width="2"/>`;
    html+=`<text x="575" y="340" text-anchor="middle" font-size="28" fill="#2D3561" font-weight="700">G</text>`;
    html+=`<text x="575" y="360" text-anchor="middle" font-size="9" fill="#5B7C99">${gTotal}개</text>`;
    html+=`</g>`;
    
    // 싱크대
    html+='<rect x="510" y="405" width="130" height="190" rx="4" fill="#E8E8E8" stroke="#6B6B6B" stroke-width="2"/>';
    html+='<text x="575" y="505" text-anchor="middle" font-size="12" fill="#4A4A4A">싱크대</text>';
    
    // 책상
    html+='<rect x="470" y="645" width="170" height="45" rx="4" fill="#E8E8E8" stroke="#6B6B6B" stroke-width="2"/>';
    html+='<text x="555" y="671" text-anchor="middle" font-size="11" fill="#4A4A4A">책상</text>';
    
    // 칠판
    html+='<rect x="180" y="645" width="270" height="45" rx="4" fill="rgba(91,124,153,0.25)" stroke="#5B7C99" stroke-width="2.5"/>';
    html+='<text x="315" y="671" text-anchor="middle" font-size="14" fill="#2D3561" font-weight="600">칠  판</text>';
    
    html+='</svg></div>';
    
  }else if(state.view==='shelf'&&state.selectedId){
    let shelf=state.shelves.find(s=>s.id===state.selectedId);
    if(shelf){
      html+=renderShelfView(shelf);
    }
  }
  
  html+='</div>';
  
  // Modals
  if(state.showPin){
    html+=`<div class="modal-bg" onclick="app.closeLogin()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t">관리자 로그인</div><div style="font-size:13px;color:#7BA3C5;margin-bottom:16px;text-align:center;">PIN 입력</div><input type="password" id="pinInput" class="inp" style="letter-spacing:8px;text-align:center;margin-bottom:10px;" placeholder="• • • •" autofocus/><div id="pinErr" style="color:#C44;font-size:12px;margin-bottom:8px;text-align:center;display:none;">올바르지 않은 PIN</div><div style="display:flex;gap:10px;"><button class="btn-p" style="flex:1;" onclick="app.tryLogin()">확인</button><button class="btn-s" style="flex:1;" onclick="app.closeLogin()">취소</button></div></div></div>`;
  }
  
  if(state.showCP){
    html+=`<div class="modal-bg" onclick="app.closeChangePin()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t">PIN 변경</div><div style="margin-bottom:12px;"><label class="lbl">현재 PIN</label><input type="password" id="cpOld" class="inp" style="letter-spacing:6px;text-align:center;"/></div><div style="margin-bottom:12px;"><label class="lbl">새 PIN</label><input type="password" id="cpNew" class="inp" style="letter-spacing:6px;text-align:center;"/></div><div style="margin-bottom:12px;"><label class="lbl">새 PIN 확인</label><input type="password" id="cpNew2" class="inp" style="letter-spacing:6px;text-align:center;"/></div><div id="cpErr" style="color:#C44;font-size:12px;margin-bottom:8px;text-align:center;display:none;"></div><div style="display:flex;gap:10px;"><button class="btn-p" style="flex:1;" onclick="app.tryChangePin()">변경</button><button class="btn-s" style="flex:1;" onclick="app.closeChangePin()">취소</button></div></div></div>`;
  }
  
  if(state.itemForm){
    let item=state.itemForm.item||{};
    const isEdit=!state.itemForm.isNew;
    
    if(state.confirmDelete){
      // 삭제 확인 모달
      html+=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t" style="color:#C44;">⚠️ 삭제 확인</div><p style="text-align:center;margin-bottom:20px;color:#5B7C99;">정말 이 기자재를 삭제하시겠습니까?</p><div style="background:#F8F8F8;padding:12px;border-radius:8px;margin-bottom:20px;"><div style="font-weight:600;color:#2D3561;margin-bottom:4px;">${item.name}</div><div style="font-size:13px;color:#7BA3C5;">수량: ${item.qty}개</div></div><div style="display:flex;gap:10px;"><button type="button" class="btn-d" style="flex:1;" onclick="app.deleteFromCell()">삭제</button><button type="button" class="btn-s" style="flex:1;" onclick="app.cancelDelete()">취소</button></div></div></div>`;
    }else{
      // 일반 수정/등록 모달
      html+=`<div class="modal-bg" onclick="app.closeItemForm()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t">${isEdit?'기자재 수정':'기자재 등록'}</div><label class="lbl">기자재 이름</label><input type="text" id="itemName" class="inp" value="${item.name||''}" placeholder="예: 비커" style="margin-bottom:14px;" autofocus/><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;"><div><label class="lbl">수량</label><div style="display:flex;gap:6px;"><button type="button" class="btn-g" style="width:36px;height:36px;" onclick="app.changeQty(-1)">−</button><input type="number" id="itemQty" class="inp" value="${item.qty||1}" style="text-align:center;padding:10px 6px;"/><button type="button" class="btn-g" style="width:36px;height:36px;" onclick="app.changeQty(1)">＋</button></div></div><div><label class="lbl">상태</label><select id="itemStatus" class="inp" style="padding:10px 12px;">${STATUS_OPTIONS.map(s=>`<option ${(item.status||'정상')===s.value?'selected':''}>${s.value}</option>`).join('')}</select></div></div><label class="lbl">색상</label><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">${ITEM_COLORS.map(c=>`<button type="button" onclick="app.setColor('${c.value}')" style="width:28px;height:28px;border-radius:50%;border:${(item.color||'#5B7C99')===c.value?'3px solid #2D3561':'3px solid transparent'};background:${c.value};cursor:pointer;"/>`).join('')}</div><label class="lbl">메모</label><textarea id="itemMemo" class="inp" rows="3" style="resize:vertical;margin-bottom:18px;line-height:1.6;" placeholder="위치, 주의사항…">${item.memo||''}</textarea><div style="display:flex;gap:10px;">${isEdit?`<button type="button" class="btn-d" style="flex:1;" onclick="app.deleteFromCell()">삭제</button>`:''}<button type="button" class="btn-p" style="flex:1;" onclick="app.saveItem()">저장</button><button type="button" class="btn-s" style="flex:1;" onclick="app.closeItemForm()">취소</button></div></div></div>`;
    }
  }
  
  if(state.toast){
    html+=`<div class="toast ok">${state.toast}</div>`;
  }
  
  // 내보내기 확인 모달
  if(state.showExportConfirm){
    html+=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t">📥 HTML 내보내기</div><p style="text-align:center;margin-bottom:20px;color:#5B7C99;">현재 상태를 HTML 파일로 내보내시겠습니까?<br><br><span style="font-size:12px;color:#B0C4D4;">파일이 다운로드됩니다</span></p><div style="display:flex;gap:10px;"><button type="button" class="btn-p" style="flex:1;" onclick="app.confirmExport()">내보내기</button><button type="button" class="btn-s" style="flex:1;" onclick="app.cancelExport()">취소</button></div></div></div>`;
  }
  
  root.innerHTML=html;
}

const app={
  setView:(view)=>{state.view=view;state.selectedId=null;render();},
  openShelf:(id)=>{state.selectedId=id;state.view='shelf';state.showSearch=false;render();},
  toggleSearch:()=>{state.showSearch=!state.showSearch;render();setTimeout(()=>{const inp=document.getElementById('searchInput');if(inp)inp.focus();},100);},
  updateSearch:(val)=>{state.searchQuery=val;render();},
  openLogin:()=>{state.showPin=true;render();},
  closeLogin:()=>{state.showPin=false;render();},
  tryLogin:()=>{
    let pin=document.getElementById('pinInput').value;
    if(pin===state.adminPin){state.isAdmin=true;state.showPin=false;showToast('관리자 모드');}
    else{document.getElementById('pinErr').style.display='block';document.getElementById('pinInput').value='';}
  },
  logout:()=>{state.isAdmin=false;render();},
  openChangePin:()=>{state.showCP=true;render();},
  closeChangePin:()=>{state.showCP=false;render();},
  tryChangePin:()=>{
    let old=document.getElementById('cpOld').value,n=document.getElementById('cpNew').value,n2=document.getElementById('cpNew2').value,e=document.getElementById('cpErr');
    if(old!==state.adminPin){e.textContent='현재 PIN 오류';e.style.display='block';return;}
    if(n.length<4){e.textContent='4자리 이상';e.style.display='block';return;}
    if(n!==n2){e.textContent='불일치';e.style.display='block';return;}
    state.adminPin=n;state.showCP=false;save();showToast('PIN 변경');
  },
  openAddCell:(sid,fid,idx)=>{
    if(!state.isAdmin)return;
    state.itemForm={shelfId:sid,floorId:fid,cellIdx:idx,item:{},isNew:true};
    render();
  },
  openEditCell:(sid,fid,idx)=>{
    if(!state.isAdmin)return;
    let sh=state.shelves.find(s=>s.id===sid),fl=sh.floors.find(f=>f.id===fid);
    const actualItems=fl.items.filter(it=>it!==null);
    const item=actualItems[idx];
    state.itemForm={shelfId:sid,floorId:fid,cellIdx:idx,item:{...item},isNew:false};
    render();
  },
  closeItemForm:()=>{state.itemForm=null;render();},
  changeQty:(d)=>{let el=document.getElementById('itemQty'),v=parseInt(el.value)||1;el.value=Math.max(0,v+d);},
  setColor:(c)=>{state.itemForm.item.color=c;render();},
  saveItem:()=>{
    let name=document.getElementById('itemName').value.trim();
    if(!name)return;
    let item={
      name,
      qty:parseInt(document.getElementById('itemQty').value)||1,
      status:document.getElementById('itemStatus').value,
      color:state.itemForm.item.color||'#5B7C99',
      memo:document.getElementById('itemMemo').value.trim()
    };
    updateShelves(ss=>{
      let sh=ss.find(s=>s.id===state.itemForm.shelfId),fl=sh.floors.find(f=>f.id===state.itemForm.floorId);
      
      if(state.itemForm.isNew){
        // 새로 추가
        fl.items.push(item);
      }else{
        // 기존 수정
        const actualItems=fl.items.filter(it=>it!==null);
        const oldItem=actualItems[state.itemForm.cellIdx];
        const oldIdx=fl.items.indexOf(oldItem);
        if(oldIdx!==-1){
          fl.items[oldIdx]=item;
        }
      }
      
      return ss;
    });
    state.itemForm=null;
    showToast('저장 완료');
  },
  deleteFromCell:()=>{
    console.log('deleteFromCell 호출됨', state.itemForm);
    
    // confirm 대신 state로 관리
    if(!state.confirmDelete){
      state.confirmDelete=true;
      render();
      return;
    }
    
    // 실제 삭제 진행
    state.confirmDelete=false;
    
    try{
      updateShelves(ss=>{
        let sh=ss.find(s=>s.id===state.itemForm.shelfId);
        let fl=sh.floors.find(f=>f.id===state.itemForm.floorId);
        
        // 실제 아이템들만 필터
        const actualItems=fl.items.filter(it=>it!==null);
        const targetItem=actualItems[state.itemForm.cellIdx];
        
        // 전체 배열에서 해당 아이템 찾아서 삭제
        const realIdx=fl.items.indexOf(targetItem);
        if(realIdx!==-1){
          fl.items.splice(realIdx,1);
        }
        
        return ss;
      });
      
      state.itemForm=null;
      showToast('삭제 완료');
    }catch(e){
      alert('삭제 실패: '+e.message);
      console.error(e);
    }
  },
  cancelDelete:()=>{
    state.confirmDelete=false;
    render();
  },
  showExportModal:()=>{
    state.showExportConfirm=true;
    render();
  },
  confirmExport:()=>{
    state.showExportConfirm=false;
    render();
    exportHTML();
  },
  cancelExport:()=>{
    state.showExportConfirm=false;
    render();
  },
  openRename:(sid)=>{state.renameForm=sid;render();},
  closeRename:()=>{state.renameForm=null;render();},
  saveRename:(sid)=>{
    let val=document.getElementById('renameinp').value.trim();
    if(!val)return;
    updateShelves(ss=>ss.map(s=>s.id===sid?{...s,name:val}:s));
    state.renameForm=null;
    showToast('이름 변경');
  }
};

// window에 노출
window.app=app;

load();
render();
</script>


</body></html>
