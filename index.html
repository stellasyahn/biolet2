<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biology Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&amp;family=Noto+Serif+KR:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:linear-gradient(135deg,#E8F4F8 0%,#D4E9F0 100%);font-family:'Noto Serif KR',sans-serif;min-height:100vh;color:#2D3561;}
#root{position:relative;z-index:1;}

.hdr{background:linear-gradient(135deg,#5B7C99,#3D5A73);position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(61,90,115,.3);}
.hdr-in{max-width:900px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-ic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.1));border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.logo-t{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#FFF;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,.2);}
.logo-s{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:2px;}
.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn-nav{padding:8px 18px;border-radius:24px;border:2px solid rgba(255,255,255,.3);cursor:pointer;font-size:13px;transition:all .3s;color:rgba(255,255,255,.8);background:transparent;font-family:'Noto Serif KR',sans-serif;font-weight:500;}
.btn-nav.act{background:rgba(255,255,255,.25);color:#FFF;border-color:rgba(255,255,255,.5);}
.btn-nav:hover{background:rgba(255,255,255,.2);color:#FFF;transform:translateY(-2px);}
.admin-badge{padding:6px 14px;border-radius:24px;background:linear-gradient(135deg,rgba(255,215,0,.3),rgba(255,200,0,.2));color:#FFD700;border:2px solid rgba(255,215,0,.4);font-size:11px;font-weight:600;cursor:pointer;}

.ct{padding:28px 20px;max-width:900px;margin:0 auto;}
.hint{font-size:12px;color:#5B7C99;font-style:italic;font-family:'Playfair Display',serif;margin-bottom:16px;text-align:center;}
.map-wrapper{background:linear-gradient(135deg,#FFF 0%,#F0F8FF 100%);border-radius:20px;border:2px solid rgba(91,124,153,.2);overflow:hidden;margin-bottom:24px;box-shadow:0 8px 32px rgba(61,90,115,.15);padding:24px;}

.btn{border:none;cursor:pointer;font-family:'Noto Serif KR',sans-serif;border-radius:12px;transition:all .3s;font-weight:600;}
.btn-p{padding:10px 20px;background:linear-gradient(135deg,#5B7C99,#4A6B88);color:#FFF;font-size:13px;box-shadow:0 4px 12px rgba(61,90,115,.25);}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(61,90,115,.35);}
.btn-s{padding:10px 16px;background:#FFF;color:#5B7C99;border:2px solid rgba(91,124,153,.3);font-size:13px;}
.btn-export{padding:10px 20px;background:linear-gradient(135deg,#7BA3C5,#6B93B5);color:#FFF;font-size:13px;box-shadow:0 4px 12px rgba(91,124,153,.25);}
.btn-g{padding:7px 13px;background:#FFF;color:#5B7C99;border:2px solid rgba(91,124,153,.25);font-size:11px;}
.btn-d{padding:7px 13px;background:linear-gradient(135deg,#FFE5E5,#FFD5D5);color:#C44;border:2px solid rgba(204,68,68,.2);font-size:11px;}

.inp{padding:12px 16px;border-radius:12px;border:2px solid rgba(91,124,153,.25);background:#FFF;color:#2D3561;font-size:14px;font-family:'Noto Serif KR',sans-serif;outline:none;width:100%;transition:all .3s;}
.inp:focus{border-color:#5B7C99;box-shadow:0 0 0 4px rgba(91,124,153,.1);}
.lbl{font-size:12px;font-weight:600;color:#5B7C99;margin-bottom:6px;display:block;}

.modal-bg{position:fixed;inset:0;background:rgba(45,53,97,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px);animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:linear-gradient(135deg,#FFF 0%,#F5FAFF 100%);border-radius:24px;padding:28px;width:380px;max-width:92vw;box-shadow:0 24px 60px rgba(61,90,115,.3);border:2px solid rgba(91,124,153,.2);max-height:90vh;overflow-y:auto;}
.modal-t{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;color:#2D3561;margin-bottom:18px;}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:toastIn .3s;}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.toast.ok{background:linear-gradient(135deg,#5B7C99,#4A6B88);color:#FFF;}

.shelf-container{background:linear-gradient(135deg,#FFF,#F8FBFF);border-radius:20px;border:2px solid rgba(91,124,153,.2);padding:24px;box-shadow:0 8px 24px rgba(61,90,115,.1);}
.shelf-visual{background:linear-gradient(135deg,#F0F8FF,#E8F4F8);border:3px solid rgba(91,124,153,.3);border-radius:16px;padding:20px;position:relative;}
.shelf-floor{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:16px 0;border-bottom:2px dashed rgba(91,124,153,.2);}
.shelf-floor:last-child{border:none;}
.shelf-floor-label{position:absolute;left:-50px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:700;color:#5B7C99;writing-mode:vertical-rl;}
.shelf-cell{background:linear-gradient(135deg,#FFF,#F5FAFF);border:2px solid rgba(91,124,153,.25);border-radius:10px;padding:12px 8px;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .3s;position:relative;}
.shelf-cell:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(61,90,115,.2);border-color:#5B7C99;}
.shelf-cell-name{font-size:11px;font-weight:600;color:#2D3561;text-align:center;line-height:1.3;word-break:break-word;}
.shelf-cell-qty{font-size:10px;color:#5B7C99;font-weight:600;}
.shelf-cell-empty{color:#B0C4D4;font-style:italic;font-size:10px;}
.shelf-cell-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:8px;right:8px;}
</style>

<script>
const ITEM_COLORS=[
  {label:"기본",value:"#94A3B8"},{label:"빨강",value:"#C44"},
  {label:"주황",value:"#E67E22"},{label:"노랑",value:"#F39C12"},
  {label:"초록",value:"#27AE60"},{label:"파랑",value:"#5B7C99"},
  {label:"보라",value:"#8E44AD"},{label:"핑크",value:"#E91E63"},
];

const STATUS_OPTIONS=[
  {value:"정상",color:"#27AE60"},{value:"부족",color:"#E67E22"},
  {value:"점검필요",color:"#C44"},{value:"없음",color:"#95A5A6"},
];

const DEFAULT_PIN="1234";

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

const makeFloors=(id,n,cols=6)=>Array.from({length:n},(_,i)=>({
  id:`${id}-fl${i+1}`,
  label:`${i+1}층`,
  items:Array(cols).fill(null)
}));

const INIT_SHELVES=[{"id": "A", "name": "A 선반", "color": "#5B7C99", "floors": [{"id": "A-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "A-fl2", "label": "2층", "items": [null, null, null, null, null, null, {"name": "Test", "qty": 1, "status": "정상", "color": "#5B7C99", "memo": ""}]}]}, {"id": "B", "name": "B 선반", "color": "#5B7C99", "floors": [{"id": "B-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "B-fl2", "label": "2층", "items": [null, null, null, null, null, null, {"name": "Test2", "qty": 1, "status": "정상", "color": "#5B7C99", "memo": ""}]}]}, {"id": "C", "name": "C 선반", "color": "#5B7C99", "floors": [{"id": "C-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "C-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "D", "name": "D 선반", "color": "#5B7C99", "floors": [{"id": "D-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "D-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "E", "name": "E 선반", "color": "#5B7C99", "floors": [{"id": "E-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "E-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "F", "name": "F 선반", "color": "#5B7C99", "floors": [{"id": "F-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "F-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "G", "name": "G 선반", "color": "#5B7C99", "floors": [{"id": "G-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "G-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "H", "name": "H 선반", "color": "#5B7C99", "floors": [{"id": "H-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "H-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "I", "name": "I 선반", "color": "#5B7C99", "floors": [{"id": "I-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "I-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "drug", "name": "약품보관장", "color": "#4A6B88", "floors": [{"id": "drug-fl1", "label": "1층", "items": [null, null, null, null, null, null]}, {"id": "drug-fl2", "label": "2층", "items": [null, null, null, null, null, null]}]}, {"id": "J", "name": "J 선반", "color": "#5B7C99", "floors": [{"id": "J-fl1", "label": "1층", "items": [null, null, null, null, null, null]}]}];

let state={
  shelves:INIT_SHELVES,
  adminPin:DEFAULT_PIN,
  view:"map",
  selectedId:null,
  isAdmin:false,
  showPin:false,
  showCP:false,
  itemForm:null,
  renameForm:null,
  toast:null,
  showSearch:false,
  searchQuery:'',
  confirmDelete:false,
  showExportConfirm:false,
};

function save(){
  try{localStorage.setItem('biolab',JSON.stringify({shelves:state.shelves,adminPin:state.adminPin}));}
  catch(e){console.error(e);}
}

function load(){
  try{
    const data=localStorage.getItem('biolab');
    if(data){
      const parsed=JSON.parse(data);
      if(parsed.shelves){
        const savedMap={};
        parsed.shelves.forEach(s=>{savedMap[s.id]=s;});
        state.shelves=INIT_SHELVES.map(initShelf=>{
          return savedMap[initShelf.id]||initShelf;
        });
        parsed.shelves.forEach(s=>{
          if(!state.shelves.find(x=>x.id===s.id)) state.shelves.push(s);
        });
      }
      if(parsed.adminPin)state.adminPin=parsed.adminPin;
    }
  }catch(e){console.error(e);}
}

function showToast(msg){
  state.toast=msg;
  render();
  setTimeout(()=>{state.toast=null;render();},2200);
}

function updateShelves(fn){
  state.shelves=fn(state.shelves);
  save();
  render();
}

function exportHTML(){
  try{
    // hidden textarea에서 원본 소스 가져오기 (outerHTML 사용 안 함)
    let out = document.getElementById('__src__').value;

    const shelves = JSON.stringify(state.shelves);
    const pin = state.adminPin;

    // INIT_SHELVES: 시작 위치 ~ "\n\nlet state=" 직전까지 통째로 교체
    const s1 = out.indexOf('const INIT_SHELVES=');
    const s2 = out.indexOf('\n\nlet state=');
    if(s1===-1||s2===-1){alert('소스 마커를 찾지 못했습니다');return;}
    out = out.slice(0,s1) + 'const INIT_SHELVES=' + shelves + ';' + out.slice(s2);

    // DEFAULT_PIN 교체
    out = out.replace(/const DEFAULT_PIN="[^"]*";/, 'const DEFAULT_PIN="'+pin+'";');

    // hidden textarea 값도 업데이트 (연속 내보내기 대비)
    document.getElementById('__src__').value = out;

    const blob=new Blob([out],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='생물실_기자재_'+new Date().toISOString().slice(0,10)+'.html';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    showToast('내보내기 완료!');
  }catch(e){
    alert('내보내기 실패: '+e.message);
    console.error(e);
  }
}

// 전역으로 노출
window.exportHTML=exportHTML;

function renderShelfView(shelf){
  let html='<div class="shelf-container">';
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;"><div style="display:flex;align-items:center;gap:12px;">`;
  
  if(state.renameForm===shelf.id){
    html+=`<input type="text" id="renameinp" class="inp" value="${shelf.name}" style="width:200px;"/><button class="btn-g" onclick="app.saveRename('${shelf.id}')">저장</button><button class="btn-g" onclick="app.closeRename()">취소</button>`;
  }else{
    html+=`<span style="font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#2D3561;">${shelf.name}</span>`;
    if(state.isAdmin){
      html+=`<button class="btn-g" onclick="app.openRename('${shelf.id}')">이름 수정</button>`;

    html+=`<div class="modal-bg" onclick="app.closeChangePin()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t">PIN 변경</div><div style="margin-bottom:12px;"><label class="lbl">현재 PIN</label><input type="password" id="cpOld" class="inp" style="letter-spacing:6px;text-align:center;"/></div><div style="margin-bottom:12px;"><label class="lbl">새 PIN</label><input type="password" id="cpNew" class="inp" style="letter-spacing:6px;text-align:center;"/></div><div style="margin-bottom:12px;"><label class="lbl">새 PIN 확인</label><input type="password" id="cpNew2" class="inp" style="letter-spacing:6px;text-align:center;"/></div><div id="cpErr" style="color:#C44;font-size:12px;margin-bottom:8px;text-align:center;display:none;"></div><div style="display:flex;gap:10px;"><button class="btn-p" style="flex:1;" onclick="app.tryChangePin()">변경</button><button class="btn-s" style="flex:1;" onclick="app.closeChangePin()">취소</button></div></div></div>`;
  }
  
  if(state.itemForm){
    let item=state.itemForm.item||{};
    const isEdit=!state.itemForm.isNew;
    
    if(state.confirmDelete){
      // 삭제 확인 모달
      html+=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t" style="color:#C44;">⚠️ 삭제 확인</div><p style="text-align:center;margin-bottom:20px;color:#5B7C99;">정말 이 기자재를 삭제하시겠습니까?</p><div style="background:#F8F8F8;padding:12px;border-radius:8px;margin-bottom:20px;"><div style="font-weight:600;color:#2D3561;margin-bottom:4px;">${item.name}</div><div style="font-size:13px;color:#7BA3C5;">수량: ${item.qty}개</div></div><div style="display:flex;gap:10px;"><button type="button" class="btn-d" style="flex:1;" onclick="app.deleteFromCell()">삭제</button><button type="button" class="btn-s" style="flex:1;" onclick="app.cancelDelete()">취소</button></div></div></div>`;
    }else{
      // 일반 수정/등록 모달
      html+=`<div class="modal-bg" onclick="app.closeItemForm()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t">${isEdit?'기자재 수정':'기자재 등록'}</div><label class="lbl">기자재 이름</label><input type="text" id="itemName" class="inp" value="${item.name||''}" placeholder="예: 비커" style="margin-bottom:14px;" autofocus/><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;"><div><label class="lbl">수량</label><div style="display:flex;gap:6px;"><button type="button" class="btn-g" style="width:36px;height:36px;" onclick="app.changeQty(-1)">−</button><input type="number" id="itemQty" class="inp" value="${item.qty||1}" style="text-align:center;padding:10px 6px;"/><button type="button" class="btn-g" style="width:36px;height:36px;" onclick="app.changeQty(1)">＋</button></div></div><div><label class="lbl">상태</label><select id="itemStatus" class="inp" style="padding:10px 12px;">${STATUS_OPTIONS.map(s=>`<option ${(item.status||'정상')===s.value?'selected':''}>${s.value}</option>`).join('')}</select></div></div><label class="lbl">색상</label><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">${ITEM_COLORS.map(c=>`<button type="button" onclick="app.setColor('${c.value}')" style="width:28px;height:28px;border-radius:50%;border:${(item.color||'#5B7C99')===c.value?'3px solid #2D3561':'3px solid transparent'};background:${c.value};cursor:pointer;"/>`).join('')}</div><label class="lbl">메모</label><textarea id="itemMemo" class="inp" rows="3" style="resize:vertical;margin-bottom:18px;line-height:1.6;" placeholder="위치, 주의사항…">${item.memo||''}</textarea><div style="display:flex;gap:10px;">${isEdit?`<button type="button" class="btn-d" style="flex:1;" onclick="app.deleteFromCell()">삭제</button>`:''}<button type="button" class="btn-p" style="flex:1;" onclick="app.saveItem()">저장</button><button type="button" class="btn-s" style="flex:1;" onclick="app.closeItemForm()">취소</button></div></div></div>`;
    }
  }
  
  if(state.toast){
    html+=`<div class="toast ok">${state.toast}</div>`;
  }
  
  // 내보내기 확인 모달
  if(state.showExportConfirm){
    html+=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-t">📥 HTML 내보내기</div><p style="text-align:center;margin-bottom:20px;color:#5B7C99;">현재 상태를 HTML 파일로 내보내시겠습니까?<br><br><span style="font-size:12px;color:#B0C4D4;">파일이 다운로드됩니다</span></p><div style="display:flex;gap:10px;"><button type="button" class="btn-p" style="flex:1;" onclick="app.confirmExport()">내보내기</button><button type="button" class="btn-s" style="flex:1;" onclick="app.cancelExport()">취소</button></div></div></div>`;
  }
  
  root.innerHTML=html;
}

const app={
  setView:(view)=>{state.view=view;state.selectedId=null;render();},
  openShelf:(id)=>{state.selectedId=id;state.view='shelf';state.showSearch=false;render();},
  toggleSearch:()=>{state.showSearch=!state.showSearch;render();setTimeout(()=>{const inp=document.getElementById('searchInput');if(inp)inp.focus();},100);},
  updateSearch:(val)=>{
    state.searchQuery=val;
    // 검색결과만 업데이트 (input 포커스 유지)
    const resultsEl=document.getElementById('searchResults');
    if(!resultsEl){render();return;}
    const q=val.toLowerCase();
    if(!val){resultsEl.innerHTML='';return;}
    const results=[];
    state.shelves.forEach(shelf=>{
      shelf.floors.forEach(floor=>{
        floor.items.forEach(item=>{
          if(item&&item.name.toLowerCase().includes(q)){
            results.push({shelf:shelf.name,floor:floor.label,item:item.name,shelfId:shelf.id});
          }
        });
      });
    });
    if(results.length>0){
      let h=`<div style="font-size:13px;color:#5B7C99;margin-bottom:8px;font-weight:600;">검색 결과 ${results.length}개</div>`;
      results.forEach(r=>{
        h+=`<div onclick="app.openShelf('${r.shelfId}')" style="background:#FFF;padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;border:2px solid rgba(91,124,153,.15);">${r.shelf} - ${r.floor}: <strong>${r.item}</strong></div>`;
      });
      resultsEl.innerHTML=h;
    }else{
      resultsEl.innerHTML=`<div style="text-align:center;color:#B0C4D4;padding:20px;font-style:italic;">검색 결과가 없습니다</div>`;
    }
  },
  openLogin:()=>{state.showPin=true;render();},
  closeLogin:()=>{state.showPin=false;render();},
  tryLogin:()=>{
    let pin=document.getElementById('pinInput').value;
    if(pin===state.adminPin){state.isAdmin=true;state.showPin=false;showToast('관리자 모드');}
    else{document.getElementById('pinErr').style.display='block';document.getElementById('pinInput').value='';}
  },
  logout:()=>{state.isAdmin=false;render();},
  openChangePin:()=>{state.showCP=true;render();},
  closeChangePin:()=>{state.showCP=false;render();},
  tryChangePin:()=>{
    let old=document.getElementById('cpOld').value,n=document.getElementById('cpNew').value,n2=document.getElementById('cpNew2').value,e=document.getElementById('cpErr');
    if(old!==state.adminPin){e.textContent='현재 PIN 오류';e.style.display='block';return;}
    if(n.length<4){e.textContent='4자리 이상';e.style.display='block';return;}
    if(n!==n2){e.textContent='불일치';e.style.display='block';return;}
    state.adminPin=n;state.showCP=false;save();showToast('PIN 변경');
  },
  openAddCell:(sid,fid,side)=>{
    if(!state.isAdmin)return;
    state.itemForm={shelfId:sid,floorId:fid,side:side||null,item:{},isNew:true};
    render();
  },
  openEditCell:(sid,fid,idx,side)=>{
    if(!state.isAdmin)return;
    let sh=state.shelves.find(s=>s.id===sid),fl=sh.floors.find(f=>f.id===fid);
    // side가 있으면 해당 side 아이템 목록에서 idx번째
    let item;
    if(side==='R'){
      const rightItems=fl.items.filter(it=>it!==null&&it.side==='R');
      item=rightItems[idx];
    }else if(side==='L'){
      const leftItems=fl.items.filter(it=>it!==null&&it.side!=='R');
      item=leftItems[idx];
    }else{
      const actualItems=fl.items.filter(it=>it!==null);
      item=actualItems[idx];
    }
    state.itemForm={shelfId:sid,floorId:fid,side:side||null,cellIdx:idx,item:{...item},isNew:false};
    render();
  },
  closeItemForm:()=>{state.itemForm=null;render();},
  changeQty:(d)=>{let el=document.getElementById('itemQty'),v=parseInt(el.value)||1;el.value=Math.max(0,v+d);},
  setColor:(c)=>{state.itemForm.item.color=c;render();},
  saveItem:()=>{
    let name=document.getElementById('itemName').value.trim();
    if(!name)return;
    let item={
      name,
      qty:parseInt(document.getElementById('itemQty').value)||1,
      status:document.getElementById('itemStatus').value,
      color:state.itemForm.item.color||'#5B7C99',
      memo:document.getElementById('itemMemo').value.trim()
    };
    // side 정보 item에 포함
    if(state.itemForm.side==='R') item.side='R';
    else if(state.itemForm.side==='L') delete item.side;
    updateShelves(ss=>{
      let sh=ss.find(s=>s.id===state.itemForm.shelfId),fl=sh.floors.find(f=>f.id===state.itemForm.floorId);
      if(state.itemForm.isNew){
        fl.items.push(item);
      }else{
        // side 기반으로 기존 아이템 찾기
        const side=state.itemForm.side;
        let targetItems;
        if(side==='R') targetItems=fl.items.filter(it=>it!==null&&it.side==='R');
        else if(side==='L') targetItems=fl.items.filter(it=>it!==null&&it.side!=='R');
        else targetItems=fl.items.filter(it=>it!==null);
        const oldItem=targetItems[state.itemForm.cellIdx];
        const oldIdx=fl.items.indexOf(oldItem);
        if(oldIdx!==-1) fl.items[oldIdx]=item;
      }
      return ss;
    });
    state.itemForm=null;
    showToast('저장 완료');
  },
  deleteFromCell:()=>{
    console.log('deleteFromCell 호출됨', state.itemForm);
    
    // confirm 대신 state로 관리
    if(!state.confirmDelete){
      state.confirmDelete=true;
      render();
      return;
    }
    
    // 실제 삭제 진행
    state.confirmDelete=false;
    
    try{
      // itemForm을 먼저 복사 후 null로 설정 (updateShelves→render() 호출 전에)
      const form=state.itemForm;
      state.itemForm=null;
      updateShelves(ss=>{
        let sh=ss.find(s=>s.id===form.shelfId);
        let fl=sh.floors.find(f=>f.id===form.floorId);
        const side=form.side;
        let sideItems;
        if(side==='R') sideItems=fl.items.filter(it=>it!==null&&it.side==='R');
        else if(side==='L') sideItems=fl.items.filter(it=>it!==null&&it.side!=='R');
        else sideItems=fl.items.filter(it=>it!==null);
        const targetItem=sideItems[form.cellIdx];
        const realIdx=fl.items.indexOf(targetItem);
        if(realIdx!==-1) fl.items.splice(realIdx,1);
        return ss;
      });
      showToast('삭제 완료');
    }catch(e){
      alert('삭제 실패: '+e.message);
      console.error(e);
    }
  },
  cancelDelete:()=>{
    state.confirmDelete=false;
    render();
  },
  showExportModal:()=>{
    state.showExportConfirm=true;
    render();
  },
  confirmExport:()=>{
    state.showExportConfirm=false;
    render();
    exportHTML();
  },
  cancelExport:()=>{
    state.showExportConfirm=false;
    render();
  },
  openRename:(sid)=>{state.renameForm=sid;render();},
  closeRename:()=>{state.renameForm=null;render();},
  saveRename:(sid)=>{
    let val=document.getElementById('renameinp').value.trim();
    if(!val)return;
    updateShelves(ss=>ss.map(s=>s.id===sid?{...s,name:val}:s));
    state.renameForm=null;
    showToast('이름 변경');
  }
};

// window에 노출
window.app=app;

load();
render();
</script>



<textarea id="__src__" style="display:none">&lt;html lang=&quot;ko&quot;&gt;&lt;head&gt;

function save(){
  try{localStorage.setItem('biolab',JSON.stringify({shelves:state.shelves,adminPin:state.adminPin}));}
  catch(e){console.error(e);}
}

function load(){
  try{
    const data=localStorage.getItem('biolab');
    if(data){
      const parsed=JSON.parse(data);
      if(parsed.shelves){
        // 저장된 선반 데이터와 INIT_SHELVES를 병합:
        // 기존 저장 데이터를 우선 사용하되, 새로 추가된 선반(H, I, J 등)은 INIT_SHELVES에서 추가
        const savedMap={};
        parsed.shelves.forEach(s=&gt;{savedMap[s.id]=s;});
        state.shelves=INIT_SHELVES.map(initShelf=&gt;{
          return savedMap[initShelf.id]||initShelf;
        });
        // 저장된 데이터에만 있는 선반도 유지 (커스텀 선반 대비)
        parsed.shelves.forEach(s=&gt;{
          if(!state.shelves.find(x=&gt;x.id===s.id)) state.shelves.push(s);
        });
      }
      if(parsed.adminPin)state.adminPin=parsed.adminPin;
    }
  }catch(e){console.error(e);}
}

function showToast(msg){
  state.toast=msg;
  render();
  setTimeout(()=&gt;{state.toast=null;render();},2200);

function updateShelves(fn){
  state.shelves=fn(state.shelves);
  save();
  render();
}

    const pin = state.adminPin;

    // INIT_SHELVES: 시작 위치 ~ &quot;\n\nlet state=&quot; 직전까지 통째로 교체
    const s1 = out.indexOf('const INIT_SHELVES=');
    const s2 = out.indexOf('\n\nlet state=');
    if(s1===-1||s2===-1){alert('소스 마커를 찾지 못했습니다');return;}
    out = out.slice(0,s1) + 'const INIT_SHELVES=' + shelves + ';' + out.slice(s2);

    // DEFAULT_PIN 교체
    out = out.replace(/const DEFAULT_PIN=&quot;[^&quot;]*&quot;;/, 'const DEFAULT_PIN=&quot;'+pin+'&quot;;');

    // hidden textarea 값도 업데이트 (연속 내보내기 대비)
    document.getElementById('__src__').value = out;

    const blob=new Blob([out],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='생물실_기자재_'+new Date().toISOString().slice(0,10)+'.html';
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=&gt;{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    showToast('내보내기 완료!');
  }catch(e){
    alert('내보내기 실패: '+e.message);
    console.error(e);
  }
}

    }else{

      html+=`&lt;div class=&quot;modal-bg&quot; onclick=&quot;app.closeItemForm()&quot;&gt;&lt;div class=&quot;modal&quot; onclick=&quot;event.stopPropagation()&quot;&gt;&lt;div class=&quot;modal-t&quot;&gt;${isEdit?'기자재 수정':'기자재 등록'}&lt;/div&gt;&lt;label class=&quot;lbl&quot;&gt;기자재 이름&lt;/label&gt;&lt;input type=&quot;text&quot; id=&quot;itemName&quot; class=&quot;inp&quot; value=&quot;${item.name||''}&quot; placeholder=&quot;예: 비커&quot; style=&quot;margin-bottom:14px;&quot; autofocus/&gt;&lt;div style=&quot;display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;&quot;&gt;&lt;div&gt;&lt;label class=&quot;lbl&quot;&gt;수량&lt;/label&gt;&lt;div style=&quot;display:flex;gap:6px;&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn-g&quot; style=&quot;width:36px;height:36px;&quot; onclick=&quot;app.changeQty(-1)&quot;&gt;−&lt;/button&gt;&lt;input type=&quot;number&quot; id=&quot;itemQty&quot; class=&quot;inp&quot; value=&quot;${item.qty||1}&quot; style=&quot;text-align:center;padding:10px 6px;&quot;/&gt;&lt;button type=&quot;button&quot; class=&quot;btn-g&quot; style=&quot;width:36px;height:36px;&quot; onclick=&quot;app.changeQty(1)&quot;&gt;＋&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;div&gt;&lt;label class=&quot;lbl&quot;&gt;상태&lt;/label&gt;&lt;select id=&quot;itemStatus&quot; class=&quot;inp&quot; style=&quot;padding:10px 12px;&quot;&gt;${STATUS_OPTIONS.map(s=&gt;`&lt;option ${(item.status||'정상')===s.value?'selected':''}&gt;${s.value}&lt;/option&gt;`).join('')}&lt;/select&gt;&lt;/div&gt;&lt;/div&gt;&lt;label class=&quot;lbl&quot;&gt;색상&lt;/label&gt;&lt;div style=&quot;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;&quot;&gt;${ITEM_COLORS.map(c=&gt;`&lt;button type=&quot;button&quot; onclick=&quot;app.setColor('${c.value}')&quot; style=&quot;width:28px;height:28px;border-radius:50%;border:${(item.color||'#5B7C99')===c.value?'3px solid #2D3561':'3px solid transparent'};background:${c.value};cursor:pointer;&quot;/&gt;`).join('')}&lt;/div&gt;&lt;label class=&quot;lbl&quot;&gt;메모&lt;/label&gt;&lt;textarea id=&quot;itemMemo&quot; class=&quot;inp&quot; rows=&quot;3&quot; style=&quot;resize:vertical;margin-bottom:18px;line-height:1.6;&quot; placeholder=&quot;위치, 주의사항…&quot;&gt;${item.memo||''}&lt;/textarea&gt;&lt;div style=&quot;display:flex;gap:10px;&quot;&gt;${isEdit?`&lt;button type=&quot;button&quot; class=&quot;btn-d&quot; style=&quot;flex:1;&quot; onclick=&quot;app.deleteFromCell()&quot;&gt;삭제&lt;/button&gt;`:''}&lt;button type=&quot;button&quot; class=&quot;btn-p&quot; style=&quot;flex:1;&quot; onclick=&quot;app.saveItem()&quot;&gt;저장&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn-s&quot; style=&quot;flex:1;&quot; onclick=&quot;app.closeItemForm()&quot;&gt;취소&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;`;
    }

  if(state.toast){
    html+=`&lt;div class=&quot;toast ok&quot;&gt;${state.toast}&lt;/div&gt;`;
  }
  
  // 내보내기 확인 모달
  if(state.showExportConfirm){
    html+=`&lt;div class=&quot;modal-bg&quot;&gt;&lt;div class=&quot;modal&quot; onclick=&quot;event.stopPropagation()&quot;&gt;&lt;div class=&quot;modal-t&quot;&gt;📥 HTML 내보내기&lt;/div&gt;&lt;p style=&quot;text-align:center;margin-bottom:20px;color:#5B7C99;&quot;&gt;현재 상태를 HTML 파일로 내보내시겠습니까?&lt;br&gt;&lt;br&gt;&lt;span style=&quot;font-size:12px;color:#B0C4D4;&quot;&gt;파일이 다운로드됩니다&lt;/span&gt;&lt;/p&gt;&lt;div style=&quot;display:flex;gap:10px;&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn-p&quot; style=&quot;flex:1;&quot; onclick=&quot;app.confirmExport()&quot;&gt;내보내기&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn-s&quot; style=&quot;flex:1;&quot; onclick=&quot;app.cancelExport()&quot;&gt;취소&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;`;

const app={
  setView:(view)=&gt;{state.view=view;state.selectedId=null;render();},
  openShelf:(id)=&gt;{state.selectedId=id;state.view='shelf';state.showSearch=false;render();},
  toggleSearch:()=&gt;{state.showSearch=!state.showSearch;render();setTimeout(()=&gt;{const inp=document.getElementById('searchInput');if(inp)inp.focus();},100);},
  updateSearch:(val)=&gt;{
    state.searchQuery=val;
    // 검색결과만 업데이트 (input 포커스 유지)
    const resultsEl=document.getElementById('searchResults');
    if(!resultsEl){render();return;}
    const q=val.toLowerCase();
    if(!val){resultsEl.innerHTML='';return;}
    const results=[];
    state.shelves.forEach(shelf=&gt;{
      shelf.floors.forEach(floor=&gt;{
        floor.items.forEach(item=&gt;{
          if(item&amp;&amp;item.name.toLowerCase().includes(q)){
            results.push({shelf:shelf.name,floor:floor.label,item:item.name,shelfId:shelf.id});
          }
        });
      });
    });
    if(results.length&gt;0){
      let h=`&lt;div style=&quot;font-size:13px;color:#5B7C99;margin-bottom:8px;font-weight:600;&quot;&gt;검색 결과 ${results.length}개&lt;/div&gt;`;
      results.forEach(r=&gt;{
        h+=`&lt;div onclick=&quot;app.openShelf('${r.shelfId}')&quot; style=&quot;background:#FFF;padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;border:2px solid rgba(91,124,153,.15);&quot;&gt;${r.shelf} - ${r.floor}: &lt;strong&gt;${r.item}&lt;/strong&gt;&lt;/div&gt;`;
      });
      resultsEl.innerHTML=h;
    }else{
      resultsEl.innerHTML=`&lt;div style=&quot;text-align:center;color:#B0C4D4;padding:20px;font-style:italic;&quot;&gt;검색 결과가 없습니다&lt;/div&gt;`;
    }
  },
  openLogin:()=&gt;{state.showPin=true;render();},
  closeLogin:()=&gt;{state.showPin=false;render();},
  tryLogin:()=&gt;{
    let pin=document.getElementById('pinInput').value;
    if(pin===state.adminPin){state.isAdmin=true;state.showPin=false;showToast('관리자 모드');}
    else{document.getElementById('pinErr').style.display='block';document.getElementById('pinInput').value='';}
  },
  logout:()=&gt;{state.isAdmin=false;render();},
  openChangePin:()=&gt;{state.showCP=true;render();},
  closeChangePin:()=&gt;{state.showCP=false;render();},
  tryChangePin:()=&gt;{
    let old=document.getElementById('cpOld').value,n=document.getElementById('cpNew').value,n2=document.getElementById('cpNew2').value,e=document.getElementById('cpErr');
    if(old!==state.adminPin){e.textContent='현재 PIN 오류';e.style.display='block';return;}
    if(n.length&lt;4){e.textContent='4자리 이상';e.style.display='block';return;}
    if(n!==n2){e.textContent='불일치';e.style.display='block';return;}
    state.adminPin=n;state.showCP=false;save();showToast('PIN 변경');
  },
  openAddCell:(sid,fid,side)=&gt;{
    if(!state.isAdmin)return;
    state.itemForm={shelfId:sid,floorId:fid,side:side||null,item:{},isNew:true};
    render();
  },
  openEditCell:(sid,fid,idx,side)=&gt;{
    if(!state.isAdmin)return;
    let sh=state.shelves.find(s=&gt;s.id===sid),fl=sh.floors.find(f=&gt;f.id===fid);
    // side가 있으면 해당 side 아이템 목록에서 idx번째
    let item;
    if(side==='R'){
      const rightItems=fl.items.filter(it=&gt;it!==null&amp;&amp;it.side==='R');
      item=rightItems[idx];
    }else if(side==='L'){
      const leftItems=fl.items.filter(it=&gt;it!==null&amp;&amp;it.side!=='R');
      item=leftItems[idx];
    }else{
      const actualItems=fl.items.filter(it=&gt;it!==null);
      item=actualItems[idx];
    }
    state.itemForm={shelfId:sid,floorId:fid,side:side||null,cellIdx:idx,item:{...item},isNew:false};
    render();
  },
  closeItemForm:()=&gt;{state.itemForm=null;render();},
  changeQty:(d)=&gt;{let el=document.getElementById('itemQty'),v=parseInt(el.value)||1;el.value=Math.max(0,v+d);},
  setColor:(c)=&gt;{state.itemForm.item.color=c;render();},
  saveItem:()=&gt;{
    let name=document.getElementById('itemName').value.trim();
    if(!name)return;
    let item={
      name,
      qty:parseInt(document.getElementById('itemQty').value)||1,
      status:document.getElementById('itemStatus').value,
      color:state.itemForm.item.color||'#5B7C99',
      memo:document.getElementById('itemMemo').value.trim()
    };
    // side 정보 item에 포함
    if(state.itemForm.side==='R') item.side='R';
    else if(state.itemForm.side==='L') delete item.side;
    updateShelves(ss=&gt;{
      let sh=ss.find(s=&gt;s.id===state.itemForm.shelfId),fl=sh.floors.find(f=&gt;f.id===state.itemForm.floorId);
      if(state.itemForm.isNew){
        fl.items.push(item);
      }else{
        // side 기반으로 기존 아이템 찾기
        const side=state.itemForm.side;
        let targetItems;
        if(side==='R') targetItems=fl.items.filter(it=&gt;it!==null&amp;&amp;it.side==='R');
        else if(side==='L') targetItems=fl.items.filter(it=&gt;it!==null&amp;&amp;it.side!=='R');
        else targetItems=fl.items.filter(it=&gt;it!==null);
        const oldItem=targetItems[state.itemForm.cellIdx];
        const oldIdx=fl.items.indexOf(oldItem);
        if(oldIdx!==-1) fl.items[oldIdx]=item;
      }
      return ss;
    });
    state.itemForm=null;
    showToast('저장 완료');
  },
  deleteFromCell:()=&gt;{
    console.log('deleteFromCell 호출됨', state.itemForm);
    
    // confirm 대신 state로 관리
    if(!state.confirmDelete){
      state.confirmDelete=true;
      render();
      return;
    }
    
    // 실제 삭제 진행
    state.confirmDelete=false;
    
    try{
      // itemForm을 먼저 복사 후 null로 설정 (updateShelves→render() 호출 전에)
      const form=state.itemForm;
      state.itemForm=null;
      updateShelves(ss=&gt;{
        let sh=ss.find(s=&gt;s.id===form.shelfId);
        let fl=sh.floors.find(f=&gt;f.id===form.floorId);
        const side=form.side;
        let sideItems;
        if(side==='R') sideItems=fl.items.filter(it=&gt;it!==null&amp;&amp;it.side==='R');
        else if(side==='L') sideItems=fl.items.filter(it=&gt;it!==null&amp;&amp;it.side!=='R');
        else sideItems=fl.items.filter(it=&gt;it!==null);
        const targetItem=sideItems[form.cellIdx];
        const realIdx=fl.items.indexOf(targetItem);
        if(realIdx!==-1) fl.items.splice(realIdx,1);
        return ss;
      });
      showToast('삭제 완료');
    }catch(e){
      alert('삭제 실패: '+e.message);
      console.error(e);
    }
  },
  cancelDelete:()=&gt;{
    state.confirmDelete=false;
    render();
  },
  showExportModal:()=&gt;{
    state.showExportConfirm=true;
    render();
  },
  confirmExport:()=&gt;{
    state.showExportConfirm=false;
    render();
    exportHTML();
  },
  cancelExport:()=&gt;{
    state.showExportConfirm=false;
    render();
  },
  openRename:(sid)=&gt;{state.renameForm=sid;render();},
  closeRename:()=&gt;{state.renameForm=null;render();},
  saveRename:(sid)=&gt;{
    let val=document.getElementById('renameinp').value.trim();
    if(!val)return;
    updateShelves(ss=&gt;ss.map(s=&gt;s.id===sid?{...s,name:val}:s));
    state.renameForm=null;
    showToast('이름 변경');
  }
};

// window에 노출
window.app=app;

load();
render();
&lt;/script&gt;
