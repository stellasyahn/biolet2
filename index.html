<html lang="ko"><head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js" integrity="sha512-iZ2ORl595Wx6miw+GuadDet4WQbdSWS3JLMoNfY8cRGoEFy6oT3G9IbcrBeL6AfkgpA51ETt/faX6yLV+/gFJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function() {
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            window.parent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            window.parent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            window.parent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        let requestId = 0;
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = requestId++;
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream
                resolve(new Response(stream, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: response.headers
                }));
              },
              reject,
              channelId
            });
            
            window.parent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          if (event.data.type === 'takeScreenshot') {
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: new Error('Root element not found'),
              }, '*');
            }
            const screenshot = await htmlToImage.toPng(rootElement, {
              imagePlaceholder:
                "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
            });
            window.parent.postMessage({
              type: 'screenshotData',
              data: screenshot,
            }, '*');
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              window.parent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            window.parent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();
    </script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:linear-gradient(135deg,#E8F4F8 0%,#D4E9F0 100%);font-family:'Noto Serif KR',sans-serif;min-height:100vh;color:#2D3561;}
#root{position:relative;z-index:1;}

.logo-s{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:2px;}

</style>

    const currentPin = JSON.stringify(state.adminPin);

    let html = document.documentElement.outerHTML;

    html = html.replace(

      'const INIT_SHELVES=' + currentShelves + ';'
    );

    // DEFAULT_PIN을 현재 PIN으로 교체

    );

    a.style.display='none';

}

    });

    html+='</div>';

}

const app={
  setView:(view)=>{state.view=view;state.selectedId=null;render();},
  openShelf:(id)=>{state.selectedId=id;state.view='shelf';state.showSearch=false;render();},
  toggleSearch:()=>{state.showSearch=!state.showSearch;render();setTimeout(()=>{const inp=document.getElementById('searchInput');if(inp)inp.focus();},100);},
  updateSearch:(val)=>{
    state.searchQuery=val;
    // 검색결과만 업데이트 (input 포커스 유지)
    const resultsEl=document.getElementById('searchResults');
    if(!resultsEl){render();return;}
    const q=val.toLowerCase();
    if(!val){resultsEl.innerHTML='';return;}
    const results=[];
    state.shelves.forEach(shelf=>{
      shelf.floors.forEach(floor=>{
        floor.items.forEach(item=>{
          if(item&&item.name.toLowerCase().includes(q)){
            results.push({shelf:shelf.name,floor:floor.label,item:item.name,shelfId:shelf.id});
          }
        });
      });
    });
    if(results.length>0){
      let h=`<div style="font-size:13px;color:#5B7C99;margin-bottom:8px;font-weight:600;">검색 결과 ${results.length}개</div>`;
      results.forEach(r=>{
        h+=`<div onclick="app.openShelf('${r.shelfId}')" style="background:#FFF;padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer;border:2px solid rgba(91,124,153,.15);">${r.shelf} - ${r.floor}: <strong>${r.item}</strong></div>`;
      });
      resultsEl.innerHTML=h;
    }else{
      resultsEl.innerHTML=`<div style="text-align:center;color:#B0C4D4;padding:20px;font-style:italic;">검색 결과가 없습니다</div>`;
    }
  },
  openLogin:()=>{state.showPin=true;render();},
  closeLogin:()=>{state.showPin=false;render();},
  tryLogin:()=>{
    let pin=document.getElementById('pinInput').value;
    if(pin===state.adminPin){state.isAdmin=true;state.showPin=false;showToast('관리자 모드');}
    else{document.getElementById('pinErr').style.display='block';document.getElementById('pinInput').value='';}
  },
  logout:()=>{state.isAdmin=false;render();},
  openChangePin:()=>{state.showCP=true;render();},
  closeChangePin:()=>{state.showCP=false;render();},
  tryChangePin:()=>{
    let old=document.getElementById('cpOld').value,n=document.getElementById('cpNew').value,n2=document.getElementById('cpNew2').value,e=document.getElementById('cpErr');
    if(old!==state.adminPin){e.textContent='현재 PIN 오류';e.style.display='block';return;}
    if(n.length<4){e.textContent='4자리 이상';e.style.display='block';return;}
    if(n!==n2){e.textContent='불일치';e.style.display='block';return;}
    state.adminPin=n;state.showCP=false;save();showToast('PIN 변경');
  },
  openAddCell:(sid,fid,side)=>{
    if(!state.isAdmin)return;
    state.itemForm={shelfId:sid,floorId:fid,side:side||null,item:{},isNew:true};
    render();
  },
  openEditCell:(sid,fid,idx,side)=>{
    if(!state.isAdmin)return;
    let sh=state.shelves.find(s=>s.id===sid),fl=sh.floors.find(f=>f.id===fid);
    // side가 있으면 해당 side 아이템 목록에서 idx번째
    let item;
    if(side==='R'){
      const rightItems=fl.items.filter(it=>it!==null&&it.side==='R');
      item=rightItems[idx];
    }else if(side==='L'){
      const leftItems=fl.items.filter(it=>it!==null&&it.side!=='R');
      item=leftItems[idx];
    }else{
      const actualItems=fl.items.filter(it=>it!==null);
      item=actualItems[idx];
    }
    state.itemForm={shelfId:sid,floorId:fid,side:side||null,cellIdx:idx,item:{...item},isNew:false};
    render();
  },
  closeItemForm:()=>{state.itemForm=null;render();},
  changeQty:(d)=>{let el=document.getElementById('itemQty'),v=parseInt(el.value)||1;el.value=Math.max(0,v+d);},
  setColor:(c)=>{state.itemForm.item.color=c;render();},
  saveItem:()=>{
    let name=document.getElementById('itemName').value.trim();
    if(!name)return;
    let item={
      name,
      qty:parseInt(document.getElementById('itemQty').value)||1,
      status:document.getElementById('itemStatus').value,
      color:state.itemForm.item.color||'#5B7C99',
      memo:document.getElementById('itemMemo').value.trim()
    };
    // side 정보 item에 포함
    if(state.itemForm.side==='R') item.side='R';
    else if(state.itemForm.side==='L') delete item.side;
    updateShelves(ss=>{
      let sh=ss.find(s=>s.id===state.itemForm.shelfId),fl=sh.floors.find(f=>f.id===state.itemForm.floorId);
      if(state.itemForm.isNew){
        fl.items.push(item);
      }else{
        // side 기반으로 기존 아이템 찾기
        const side=state.itemForm.side;
        let targetItems;
        if(side==='R') targetItems=fl.items.filter(it=>it!==null&&it.side==='R');
        else if(side==='L') targetItems=fl.items.filter(it=>it!==null&&it.side!=='R');
        else targetItems=fl.items.filter(it=>it!==null);
        const oldItem=targetItems[state.itemForm.cellIdx];
        const oldIdx=fl.items.indexOf(oldItem);
        if(oldIdx!==-1) fl.items[oldIdx]=item;
      }
      return ss;
    });
    state.itemForm=null;
    showToast('저장 완료');
  },
  deleteFromCell:()=>{
    console.log('deleteFromCell 호출됨', state.itemForm);
    
    // confirm 대신 state로 관리
    if(!state.confirmDelete){
      state.confirmDelete=true;
      render();
      return;
    }
    
    // 실제 삭제 진행
    state.confirmDelete=false;
    
    try{
      // itemForm을 먼저 복사 후 null로 설정 (updateShelves→render() 호출 전에)
      const form=state.itemForm;
      state.itemForm=null;
      updateShelves(ss=>{
        let sh=ss.find(s=>s.id===form.shelfId);
        let fl=sh.floors.find(f=>f.id===form.floorId);
        const side=form.side;
        let sideItems;
        if(side==='R') sideItems=fl.items.filter(it=>it!==null&&it.side==='R');
        else if(side==='L') sideItems=fl.items.filter(it=>it!==null&&it.side!=='R');
        else sideItems=fl.items.filter(it=>it!==null);
        const targetItem=sideItems[form.cellIdx];
        const realIdx=fl.items.indexOf(targetItem);
        if(realIdx!==-1) fl.items.splice(realIdx,1);
        return ss;
      });
      showToast('삭제 완료');
    }catch(e){
      alert('삭제 실패: '+e.message);
      console.error(e);
    }
  },
  cancelDelete:()=>{
    state.confirmDelete=false;
    render();
  },
  showExportModal:()=>{
    state.showExportConfirm=true;
    render();
  },
  confirmExport:()=>{
    state.showExportConfirm=false;
    render();
    exportHTML();
  },
  cancelExport:()=>{
    state.showExportConfirm=false;
    render();
  },
  openRename:(sid)=>{state.renameForm=sid;render();},
  closeRename:()=>{state.renameForm=null;render();},
  saveRename:(sid)=>{
    let val=document.getElementById('renameinp').value.trim();
    if(!val)return;
    updateShelves(ss=>ss.map(s=>s.id===sid?{...s,name:val}:s));
    state.renameForm=null;
    showToast('이름 변경');
  }
};

// window에 노출
window.app=app;

load();
render();
</script>
